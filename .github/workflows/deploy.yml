name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_call: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # workflow_call: build the commit the caller just pushed
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Assemble Pages artifact (app at the site root, puzzles alongside)
        run: |
          cp -r site/dist artifact
          mkdir -p artifact/puzzles
          if ls puzzles/*.json >/dev/null 2>&1; then cp puzzles/*.json artifact/puzzles/; fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifact
      - id: deployment
        uses: actions/deploy-pages@v4
