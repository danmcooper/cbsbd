# Scrapes today's puzzle from cluesbysam.com and deploys the site if new.
# The source updates at 9pm Pacific; run at 9:01pm Pacific. Cron is UTC-only,
# so both DST offsets are scheduled (04:01 UTC = PDT, 05:01 UTC = PST) - the
# extractor is idempotent, so the off-season firing is a no-op.
name: Scrape daily puzzle

on:
  schedule:
    - cron: '1 4 * * *'
    - cron: '1 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run extract
      - id: commit
        name: Commit and push if the scrape produced changes
        run: |
          if [ -n "$(git status --porcelain puzzles)" ]; then
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add puzzles
            git commit -m "Scrape puzzle $(date -u +%F)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: scrape
    if: needs.scrape.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
